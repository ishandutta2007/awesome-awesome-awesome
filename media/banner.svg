<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="250" fill="url(#bgGrad)" />
  <rect width="800" height="250" fill="url(#grid)" />
  
  <g filter="url(#shadow)">
    <text x="400" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="52" fill="url(#textGrad)" text-anchor="middle" font-weight="900" letter-spacing="-1">AWESOME AWESOME AWESOME</text>
    <text x="400" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle" font-weight="500">The Curated Stack for the Next Decades</text>
  </g>
  
  <rect x="300" y="185" width="200" height="4" rx="2" fill="url(#textGrad)" fill-opacity="0.8" />
  
  <circle cx="50" cy="50" r="2" fill="#38bdf8" fill-opacity="0.5" />
  <circle cx="750" cy="200" r="3" fill="#818cf8" fill-opacity="0.5" />
  <circle cx="100" cy="220" r="2" fill="#38bdf8" fill-opacity="0.3" />
</svg>